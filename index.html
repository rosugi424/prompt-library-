<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #161617;
    --surface2: #1e1e20;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #e8e8e6;
    --muted: #6b6b6b;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --accent-dim2: rgba(200,240,96,0.06);
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    position: sticky;
    top: 0;
    background: rgba(14,14,15,0.9);
    backdrop-filter: blur(12px);
    z-index: 50;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  #search {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 300;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: var(--border-hover); }
  .reload-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 13px;
    padding: 7px 14px;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.2s;
  }
  .reload-btn:hover { border-color: var(--border-hover); color: var(--text); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    padding: 1rem 2rem 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 20px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Grid */
  main { padding: 1.5rem 2rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .card {
    background: var(--surface);
    padding: 1.25rem;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card:hover { background: var(--surface2); }

  /* Thumb */
  .thumb {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 5px;
    overflow: hidden;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .thumb img, .thumb video {
    width: 100%; height: 100%; object-fit: cover;
  }
  .thumb video { opacity: 0.8; }
  .thumb .play {
    position: absolute;
    width: 36px; height: 36px;
    background: rgba(0,0,0,0.6);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .thumb-empty {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; flex: 1; }
  .cat-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .cat-motion { background: var(--accent-dim); color: var(--accent); }
  .cat-char   { background: rgba(147,197,253,0.1); color: #93c5fd; }
  .cat-scene  { background: rgba(167,243,208,0.1); color: #6ee7b7; }
  .cat-other  { background: rgba(255,255,255,0.05); color: var(--muted); }

  .card-prompt {
    font-size: 11.5px;
    color: var(--muted);
    line-height: 1.65;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .card-meta { display: flex; gap: 5px; flex-wrap: wrap; }
  .pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .tag {
    font-size: 10px;
    padding: 2px 8px;
    background: var(--surface2);
    color: var(--muted);
    border-radius: 20px;
  }

  /* Modal */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border-hover);
    border-radius: 12px;
    max-width: 620px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    padding: 1.75rem;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 1.25rem; right: 1.25rem;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 18px; line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-title { font-size: 17px; font-weight: 500; margin-bottom: 4px; }
  .modal-sub { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 1.25rem; }
  .modal-media-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface2);
    margin-bottom: 1.25rem;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-media-wrap img, .modal-media-wrap video { width: 100%; height: 100%; object-fit: cover; }
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .prompt-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
    margin-bottom: 1rem;
  }
  .note-box {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 1.25rem;
    padding: 0.75rem 1rem;
    border-left: 2px solid var(--border-hover);
  }
  .copy-btn {
    background: var(--accent-dim);
    border: 1px solid rgba(200,240,96,0.2);
    border-radius: 6px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 8px 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .copy-btn:hover { background: rgba(200,240,96,0.2); }
  .copy-btn.copied { color: #6ee7b7; border-color: rgba(110,231,183,0.3); background: rgba(110,231,183,0.08); }

  /* State */
  .empty-state {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--muted);
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .empty-state .big { font-size: 2rem; margin-bottom: 1rem; opacity: 0.3; }
  .loading {
    text-align: center;
    padding: 5rem;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .error-bar {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 8px;
    padding: 1rem 1.5rem;
    margin-bottom: 1.5rem;
    font-size: 13px;
    color: #fca5a5;
    display: none;
  }
  .error-bar.show { display: block; }

  /* Config panel */
  .config-wrap {
    padding: 2rem;
    max-width: 560px;
    margin: 0 auto;
  }
  .config-wrap h2 {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
  }
  .config-field { margin-bottom: 1.25rem; }
  .config-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .config-field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .config-field input:focus { border-color: var(--border-hover); }
  .config-field input::placeholder { color: var(--muted); }
  .config-note {
    font-size: 11.5px;
    color: var(--muted);
    line-height: 1.6;
    margin-top: 6px;
  }
  .config-note a { color: var(--accent); text-decoration: none; }
  .config-btn {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #0e0e0f;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 10px 24px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 0.5rem;
  }
  .config-btn:hover { opacity: 0.85; }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    main { padding: 1rem; }
    .tabs { padding: 0.75rem 1rem 0; }
    #search { width: 160px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Prompt Library</div>
  <div class="header-right">
    <input type="text" id="search" placeholder="検索..." oninput="filterRender()">
    <button class="reload-btn" onclick="loadData()">↺ 更新</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-cat="all" onclick="setTab(this)">すべて</button>
  <button class="tab" data-cat="motion" onclick="setTab(this)">モーション</button>
  <button class="tab" data-cat="char" onclick="setTab(this)">キャラクター</button>
  <button class="tab" data-cat="scene" onclick="setTab(this)">シーン・背景</button>
  <button class="tab" data-cat="other" onclick="setTab(this)">その他</button>
</div>

<main id="main-area">
  <!-- Config screen or grid shown here -->
</main>

<!-- Detail modal -->
<div class="overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal-body">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const SHEET_ID_KEY = 'prompt-lib-sheet-id';
const CAT_MAP = {
  motion: ['cat-motion', 'Motion'],
  char:   ['cat-char',   'Char'],
  scene:  ['cat-scene',  'Scene'],
  other:  ['cat-other',  'Other'],
};

let entries = [];
let currentTab = 'all';
let sheetId = localStorage.getItem(SHEET_ID_KEY) || '';

// ── Init ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (sheetId) loadData();
  else showConfig();
});

// ── Config screen ─────────────────────────────────────
function showConfig() {
  document.getElementById('main-area').innerHTML = `
    <div class="config-wrap">
      <h2>Setup</h2>
      <div class="config-field">
        <label>Google スプレッドシート ID</label>
        <input type="text" id="cfg-id" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" value="${sheetId}">
        <p class="config-note">
          スプレッドシートURLの <code>spreadsheets/d/<strong>ここ</strong>/edit</code> の部分をコピー。<br>
          「共有」→「リンクを知っている全員が閲覧可」に設定してください。<br>
          <a href="#" onclick="showSheetHelp()">シートの列構成を確認する →</a>
        </p>
      </div>
      <button class="config-btn" onclick="saveConfig()">接続する</button>
    </div>`;
}

function showSheetHelp() {
  alert('スプレッドシートの1行目（ヘッダー）を以下の順番で作成してください:\n\nA: title\nB: category  (motion / char / scene / other)\nC: prompt\nD: duration  (例: 5s)\nE: ratio     (例: 16:9)\nF: strength  (Low / Medium / High)\nG: media     (画像または動画のURL)\nH: note\nI: tags      (カンマ区切り)\n\n2行目以降にデータを入力してください。');
}

function saveConfig() {
  const id = document.getElementById('cfg-id').value.trim();
  if (!id) return alert('シートIDを入力してください');
  sheetId = id;
  localStorage.setItem(SHEET_ID_KEY, id);
  loadData();
}

// ── Data loading ──────────────────────────────────────
async function loadData() {
  const area = document.getElementById('main-area');
  area.innerHTML = '<div class="loading">LOADING...</div>';

  // Try both English and Japanese sheet names
  const sheetNames = ['Sheet1', 'シート1', ''];
  let lastError = null;

  for (const name of sheetNames) {
    const url = name
      ? `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`
      : `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const text = await res.text();
      if (text.includes('"status":"error"') || text.includes("You need to enable")) continue;
      const json = JSON.parse(text.replace(/^.*?({.+})\s*\);?\s*$/, '$1'));
      if (!json.table) continue;
      const rows = json.table.rows || [];
      const cols = json.table.cols.map(c => c.label.toLowerCase().trim());

      const idx = k => cols.indexOf(k);
      entries = rows.map(r => ({
        title:    cell(r, idx('title')),
        cat:      cell(r, idx('category')) || 'other',
        prompt:   cell(r, idx('prompt')),
        dur:      cell(r, idx('duration')),
        ratio:    cell(r, idx('ratio')),
        strength: cell(r, idx('strength')),
        media:    cell(r, idx('media')),
        note:     cell(r, idx('note')),
        tags:     (cell(r, idx('tags')) || '').split(',').map(t=>t.trim()).filter(Boolean),
      })).filter(e => e.title && e.prompt);

      renderGrid();
      return;
    } catch(e) {
      lastError = e;
    }
  }

  area.innerHTML = `
    <div style="padding:2rem;">
      <div class="error-bar show">スプレッドシートを読み込めませんでした。IDと公開設定を確認してください。</div>
      <button class="config-btn" onclick="showConfig()">設定を変更する</button>
    </div>`;
}

function cell(row, i) {
  if (i < 0 || !row.c || !row.c[i]) return '';
  return (row.c[i].v ?? row.c[i].f ?? '').toString().trim();
}

// ── Tab / filter ──────────────────────────────────────
function setTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = el.dataset.cat;
  renderGrid();
}

function filterRender() { renderGrid(); }

// ── Grid render ───────────────────────────────────────
function renderGrid() {
  const area = document.getElementById('main-area');
  const q = document.getElementById('search').value.toLowerCase();

  const list = entries.filter(e => {
    if (currentTab !== 'all' && e.cat !== currentTab) return false;
    if (q) {
      const haystack = [e.title, e.prompt, e.note, e.tags.join(' ')].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });

  if (!list.length) {
    area.innerHTML = '<div class="empty-state"><div class="big">○</div>該当するプロンプトがありません</div>';
    return;
  }

  const cards = list.map((e, i) => {
    const [bcls, blabel] = CAT_MAP[e.cat] || ['cat-other','Other'];
    const isVid = e.media && /\.(mp4|webm|mov)/i.test(e.media);
    let thumb = '';
    if (e.media && !isVid) {
      thumb = `<div class="thumb"><img src="${e.media}" loading="lazy" onerror="this.parentNode.innerHTML='<span class=thumb-empty>NO MEDIA</span>'"></div>`;
    } else if (isVid) {
      thumb = `<div class="thumb"><video src="${e.media}" muted preload="none"></video><span class="play">▶</span></div>`;
    } else {
      thumb = `<div class="thumb"><span class="thumb-empty">NO MEDIA</span></div>`;
    }
    const pills = [e.dur, e.ratio, e.strength ? `強度:${e.strength}` : ''].filter(Boolean)
      .map(p => `<span class="pill">${p}</span>`).join('');
    const tags = e.tags.map(t => `<span class="tag">${t}</span>`).join('');
    return `<div class="card" onclick="openModal(${i},'${currentTab}')">
      ${thumb}
      <div class="card-header">
        <span class="card-title">${esc(e.title)}</span>
        <span class="cat-badge ${bcls}">${blabel}</span>
      </div>
      <div class="card-prompt">${esc(e.prompt)}</div>
      <div class="card-meta">${pills}${tags}</div>
    </div>`;
  }).join('');

  area.innerHTML = `<div class="grid">${cards}</div>`;

  // Store filtered list for modal access
  window._filtered = list;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Modal ─────────────────────────────────────────────
function openModal(idx) {
  const e = window._filtered[idx];
  if (!e) return;
  const [bcls, blabel] = CAT_MAP[e.cat] || ['cat-other','Other'];
  const isVid = e.media && /\.(mp4|webm|mov)/i.test(e.media);
  let mediaHtml = '';
  if (e.media) {
    if (isVid) mediaHtml = `<div class="modal-media-wrap"><video controls src="${e.media}"></video></div>`;
    else mediaHtml = `<div class="modal-media-wrap"><img src="${e.media}" onerror="this.parentNode.style.display='none'"></div>`;
  }
  const pills = [e.dur, e.ratio, e.strength ? `強度:${e.strength}` : ''].filter(Boolean)
    .map(p => `<span class="pill">${p}</span>`).join('');
  const tags = e.tags.map(t => `<span class="tag">${t}</span>`).join('');

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">${esc(e.title)}</div>
    <div class="modal-sub"><span class="cat-badge ${bcls}">${blabel}</span>${pills}${tags}</div>
    ${mediaHtml}
    <div class="section-label">Prompt</div>
    <div class="prompt-box">${esc(e.prompt)}</div>
    ${e.note ? `<div class="note-box">${esc(e.note)}</div>` : ''}
    <button class="copy-btn" id="copy-btn" onclick="copyPrompt(${idx})">コピー</button>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function copyPrompt(idx) {
  const e = window._filtered[idx];
  navigator.clipboard.writeText(e.prompt).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
  });
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
